<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>花蓮山線海線景點地圖</title>
<style>
:root{--mountain:#4ade80;--coast:#38bdf8;--ink:#e2e8f0;--muted:#94a3b8;--line:#334155;--bg:#0f172a;--panel:#1e293b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--ink);background:var(--bg)}
.app{display:grid;grid-template-columns:minmax(340px,400px) minmax(0,1fr);min-height:100vh}
aside{background:var(--panel);border-right:1px solid var(--line);padding:22px 20px 28px;overflow-y:auto;max-height:100vh;position:sticky;top:0}
h1{font-size:22px;line-height:1.3;margin-bottom:6px}
.sub{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:14px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.btn{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:7px 12px;color:var(--ink);text-decoration:none;font-size:13px;cursor:pointer}
.btn:hover{border-color:#475569;background:#0f172a}
.btn.active{background:#e2e8f0;color:#0f172a;border-color:#e2e8f0}
.legend{display:grid;gap:6px;margin-bottom:16px;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:13px}
.legend-item{display:flex;align-items:center;gap:8px}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.mountain{background:var(--mountain)}.dot.coast{background:var(--coast)}
.section-title{font-size:15px;font-weight:700;margin:18px 0 6px;display:flex;align-items:center;gap:6px}
.route-list{display:grid;gap:6px;margin:0;padding:0;list-style:none}
.place{border:1px solid var(--line);border-radius:8px;padding:9px 11px;background:var(--panel);cursor:pointer;transition:border-color .15s,transform .15s}
.place:hover,.place.active{border-color:#38bdf8;transform:translateY(-1px)}
.place b{display:flex;font-size:13px}
.place span{display:block;font-size:12px;line-height:1.5;margin-top:2px}
.place.mountain b{color:var(--mountain)}
.place.mountain span{color:var(--mountain)}
.place.coast b{color:var(--coast)}
.place.coast span{color:var(--coast)}
.stage{padding:16px;overflow:auto}
.map-frame{position:relative;width:min(100%,960px);margin:0 auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);box-shadow:0 12px 32px rgba(0,0,0,.5);overflow:hidden}
.map-wrap{position:relative;width:100%;aspect-ratio:900/1500}
.map-wrap img{position:absolute;inset:0;width:100%;height:100%;display:block}
.marker{position:absolute;left:calc(var(--x)*1%);top:calc(var(--y)*1%);transform:translate(var(--tx,-50%),-50%);min-height:26px;max-width:170px;border:2px solid #0f172a;border-radius:999px;box-shadow:0 2px 8px rgba(0,0,0,.6);cursor:pointer;display:flex;align-items:center;gap:4px;padding:2px 7px 2px 2px;color:#fff;font-size:11px;font-weight:700;line-height:1.15;text-align:left;z-index:3;white-space:nowrap}
.marker.mountain{background:rgba(47,125,50,.92)}.marker.coast{background:rgba(8,119,185,.93)}
.marker.left{flex-direction:row-reverse;padding:2px 2px 2px 7px;text-align:right;--tx:-100%}
.marker.right{--tx:0%}
.marker .num{flex:0 0 auto;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;background:#0f172a;font-size:10px;line-height:1}
.marker.mountain .num{color:var(--mountain)}.marker.coast .num{color:var(--coast)}
.marker .label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.marker.active{z-index:6;outline:3px solid rgba(255,255,255,.78);transform:translate(var(--tx,-50%),-50%) scale(1.1)}
.callout{position:absolute;left:50%;top:20px;transform:translateX(-50%);width:min(400px,calc(100%-24px));background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 44px 14px 14px;box-shadow:0 12px 26px rgba(0,0,0,.6);z-index:10;display:none}
.callout.show{display:block}
.callout-title{font-weight:800;font-size:15px;margin-bottom:4px}
.tag{display:inline-block;margin-bottom:6px;padding:2px 7px;color:#fff;border-radius:999px;font-size:11px}
.tag.mountain{background:var(--mountain)}.tag.coast{background:var(--coast)}
.callout p{color:var(--muted);font-size:12px;line-height:1.6}
.callout a{display:inline-block;margin-top:6px;color:var(--coast);font-size:12px}
.callout-close{position:absolute;top:8px;right:8px;width:28px;height:28px;border:1px solid var(--line);border-radius:50%;background:var(--panel);color:var(--muted);cursor:pointer;font-size:18px;line-height:1;display:grid;place-items:center}
.callout-close:hover{border-color:#475569;color:var(--ink)}
.note{margin-top:16px;padding-top:10px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;line-height:1.5}
.merge-group{margin-top:6px;padding:6px 8px;background:#0f172a;border-radius:6px;border:1px dashed var(--line)}
.merge-group .merge-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
.merge-group .merge-item{font-size:12px;padding:2px 0;color:var(--ink)}
@media(max-width:920px){.app{grid-template-columns:1fr}aside{max-height:none;border-right:0;border-bottom:1px solid var(--line);position:static}.stage{padding:10px}.marker{max-width:130px;font-size:10px}}
</style>
</head>

<aside>

<section class="stage">

<img id="mapImg" src="" alt="花蓮山線海線示意地圖">
<div class="callout" id="callout"></div>
</div>
</div>
</section>
</main>

{name:"鯉魚潭",short:"鯉魚潭",x:39.5,y:14,desc:"環潭、踩船、咖啡與湖景，是花蓮山線經典點。",recommended:true,url:"https://bunnyann.tw/carp/"},

{name:"椰子林溫泉飯店",short:"椰子林溫泉",x:42.0,y:57,desc:"本溫泉是全台灣唯一含鐵質的碳酸氫鹽泉溫泉區，泉水湧出於紅葉溪下游，虎頭山麓，含鐵質的溫泉水遇到空氣後，氧化的溫泉水色呈淡黃濁色，味則略帶鹹味，由於含有豊富的礦物質及鐵。",recommended:true,url:"https://cocoforest.970bnb.net/"},
{name:"瑞穗牧場",short:"瑞穗牧場",x:45,y:63,desc:"依靠中央山脈的瑞穗牧場，以純淨的水質種植出鮮美的牧草，讓園區中的乳牛生產優質的鮮奶，製造出各式各樣的鮮奶製品，炸得金黃酥脆的鮮奶饅頭、綿密紮實的乳酪。",recommended:true,url:"https://bunnyann.tw/ruisuicattle/"},
{name:"掃叭石柱",short:"掃叭石柱",x:46,y:69,desc:"石柱矗立在地面，那就是Satokoay（舞鶴）遺址，也被稱做掃叭石柱。舞鶴遺址至今已有3千多年的歷史，屬於史前文化的遺跡，有著許多當地阿美族與撒奇萊。",url:"https://v8876629.com.tw/4656.html"},
{name:"北回歸線標誌公園",short:"北回歸線",x:45.3,y:75,desc:"北回歸線標誌公園位在瑞穗舞鶴台地，白色日晷的造型，是旅客經過舞鶴台地時必拍照的景點，公園內周遭設有戶外停車場、巨大茶壺造型的裝置藝術、廁所。",url:"https://fullfenblog.tw/tropic-of-cancer-marker-park/"},

];

// === 路由過濾狀態 ===
let currentRoute = "mountain"; // "all" | "mountain" | "coast"

function setRoute(route) {
  currentRoute = route;
  // 控制 marker 顯示/隱藏
  document.querySelectorAll(".marker").forEach(m => {
    if (route === "all") {
      m.style.display = "";
    } else {
      m.style.display = m.classList.contains(route) ? "" : "none";
    }
  });
  // 控制清單顯示/隱藏
  document.getElementById("mountainList").style.display =
    (route === "all" || route === "mountain") ? "" : "none";
  document.getElementById("coastList").style.display =
    (route === "all" || route === "coast") ? "" : "none";
  // 更新按鈕樣式
  document.querySelectorAll(".route-filter-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.route === route);
  });
}

// 添加路由切換按鈕
const actionsDiv = document.querySelector(".actions");
const filterHTML = `
  <button class="btn route-filter-btn" data-route="all" id="btnAll">顯示全部</button>
  <button class="btn route-filter-btn active" data-route="mountain" id="btnMountain">只看台9線</button>
  <button class="btn route-filter-btn" data-route="coast" id="btnCoast">只看台11線</button>
`;
actionsDiv.insertAdjacentHTML("beforeend", filterHTML);

document.getElementById("btnAll").addEventListener("click", () => setRoute("all"));
document.getElementById("btnMountain").addEventListener("click", () => setRoute("mountain"));
document.getElementById("btnCoast").addEventListener("click", () => setRoute("coast"));

// === 渲染 ===
const wrap = document.getElementById("mapWrap");
const callout = document.getElementById("callout");
const markerByName = new Map();
const itemByName = new Map();

// 初始顯示全部（setRoute 放在渲染完成後呼叫）

// 設定 SVG 底圖
const mapImg = document.getElementById("mapImg");
const blob = new Blob([svgMap], {type: "image/svg+xml;charset=utf-8"});
const url = URL.createObjectURL(blob);
mapImg.src = url;

// 下載 SVG 按鈕（已移除，保留以免報錯）
// document.getElementById("downloadSvg").href = url;

function addMountainPlaces(places) {
  const list = document.getElementById("mountainList");
  places.forEach((p, i) => {
    const marker = document.createElement("button");
    marker.type = "button";
    const side = i % 2 === 0 ? "left" : "right";
    marker.className = `marker mountain ${side}`;
    marker.style.setProperty("--x", p.x);
    marker.style.setProperty("--y", p.y);
    marker.innerHTML = `<span class="num">${i+1}</span><span class="label">${p.short || p.name}</span>`;
    marker.title = p.name;
    marker.addEventListener("click", () => selectPlace(p, "mountain", "山線 台9線", false));
    wrap.appendChild(marker);
    markerByName.set(p.name, marker);

    const item = document.createElement("li");
    item.className = "place mountain";
    item.innerHTML = `<b>${i+1}. ${p.name}${p.recommended?' <span style="color:red">(推薦)</span>':''}</b><span>${p.desc}</span>`;
    item.addEventListener("click", () => selectPlace(p, "mountain", "山線 台9線", false));
    list.appendChild(item);
    itemByName.set(p.name, item);
  });
}

function addCoastGroups(groups) {
  const list = document.getElementById("coastList");
  groups.forEach((g, i) => {
    const marker = document.createElement("button");
    marker.type = "button";
    const side = i % 2 === 0 ? "right" : "left";
    marker.className = `marker coast ${side}`;
    marker.style.setProperty("--x", g.x);
    marker.style.setProperty("--y", g.y);
    const count = g.items.length;
    const badge = count > 1 ? `<span style="font-size:9px;background:rgba(255,255,255,.3);border-radius:999px;padding:1px 4px;margin-left:2px">${count}合</span>` : "";
    marker.innerHTML = `<span class="num">${i+1}</span><span class="label">${g.short}${badge}</span>`;
    marker.title = g.items.map(it=>it.name).join("、");
    marker.addEventListener("click", () => selectPlace(g, "coast", "海線 台11線", true));
    wrap.appendChild(marker);
    markerByName.set(g.key, marker);

    const item = document.createElement("li");
    item.className = "place coast";
    let descHtml = g.items.map((it,j) => `<span>${j+1}. ${it.name}：${it.desc}</span>`).join("");
    if (count > 1) {
      descHtml = `<div class="merge-group"><div class="merge-title">📍 ${count} 個景點共用此位置</div>${g.items.map(it=>`<div class="merge-item">${it.name}：${it.desc}</div>`).join("")}</div>`;
    }
    item.innerHTML = `<b>${i+1}. ${g.key}${g.items.some(it=>it.recommended)?' <span style="color:red">(推薦)</span>':''}</b>${descHtml}`;
    item.addEventListener("click", () => selectPlace(g, "coast", "海線 台11線", true));
    list.appendChild(item);
    itemByName.set(g.key, item);
  });
}

function closeCallout() {
  document.querySelectorAll(".marker.active,.place.active").forEach(el => el.classList.remove("active"));
  callout.className = "callout";
  callout.innerHTML = "";
}

function selectPlace(data, cls, route, isMerge) {
  // 點擊景點時自動切換到對應路線
  setRoute(cls);
  closeCallout();
  const name = isMerge ? data.key : data.name;
  const marker = markerByName.get(name);
  if (marker) {
    marker.classList.add("active");
    marker.style.display = "";  // 確保被選取的 marker 顯示
  }
  itemByName.get(name)?.classList.add("active");
  callout.className = "callout show";

  let descHtml = "";
  let linkHtml = "";
  if (isMerge) {
    descHtml = data.items.map(it => `<p><strong>${it.name}</strong>：${it.desc}</p>`).join("");
    // 取第一個有 url 的項目作為參考連結
    const firstUrl = data.items.find(it => it.url)?.url;
    if (firstUrl) {
      linkHtml = `<a href="${firstUrl}" target="_blank" rel="noopener">🔗 參考連結</a>`;
    }
  } else {
    descHtml = `<p>${data.desc}</p>`;
    if (data.url) {
      linkHtml = `<a href="${data.url}" target="_blank" rel="noopener">🔗 參考連結</a>`;
    }
  }

  callout.innerHTML = `
    <button class="callout-close" type="button" aria-label="關閉">×</button>
    <div class="callout-title">${name}</div>
    <span class="tag ${cls}">${route}</span>
    ${descHtml}
    ${linkHtml ? linkHtml + ' ' : ''}<a target="_blank" rel="noopener" href="https://www.google.com/maps/search/${encodeURIComponent(name + ' 花蓮')}">Google Maps 搜尋</a>
  `;
  callout.querySelector(".callout-close").addEventListener("click", closeCallout);

  // 手機端：點擊景點後往下滾動至地圖區域
  if (window.innerWidth <= 920) {
    const stage = document.querySelector(".stage");
    if (stage) stage.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

addMountainPlaces(mountainPlaces);
addCoastGroups(coastGroups);

// 初始狀態：手機端顯示景點清單，桌面端隱藏
const isMobile = window.innerWidth <= 920;
document.getElementById("mountainList").style.display = isMobile ? "" : "none";
document.getElementById("coastList").style.display = isMobile ? "" : "none";

// 渲染完成後設定預設只看台9線
setRoute("mountain");
</script>
